# Site settings
title: ""
description: ""
author: "Sam Zhang"
email: "qingczha@gmail.com"
url: "https://samzhangqingchuan.github.io"
baseurl: ""

# Jekyll settings
remote_theme: daattali/beautiful-jekyll
plugins:
  - jekyll-remote-theme
  - jekyll-feed
  - jekyll-sitemap

# Build settings
markdown: kramdown
highlighter: rouge
permalink: /:year/:month/:day/:title/

# Beautiful Jekyll theme settings
show-avatar: false
site-css:
  - /assets/css/site.css
social-links:
  github: SamZhangQingChuan
  email: qingczha@gmail.com

# Comments
giscus:
  hostname: giscus.app
  repository: SamZhangQingChuan/SamZhangQingChuan.github.io
  repository-id: R_kgDOGnceNg
  category: Announcements
  category-id: DIC_kwDOGnceNs4C8x2g
  mapping: pathname
  reactions-enabled: 1
  emit-metadata: 0
  theme: light

# Navigation links
navbar-links:
  关于: "about"
  博客: "blog"
  标签: "tags"

defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      comments: true

# Exclude from processing
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor/bundle/
  - vendor/cache/
  - vendor/gems/
  - vendor/ruby/
